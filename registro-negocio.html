<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Negocio</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container">

<h2>Registro Negocio</h2>

<form class="form-login">

<form class="form-login">

<input type="password" placeholder="Usuario" required>

<input type="password" placeholder="Contraseña" required>

<input type="email" placeholder="Correo electrónico" required>

<input type="text" placeholder="Nombre de la empresa" required>

<input type="tel" placeholder="Teléfono" required>

<input type="text" placeholder="Dirección" required>

<input type="text" placeholder="Ciudad" required>

<input type="text" placeholder="Horario (Ej: 9am - 9pm)" required>

<input type="text" placeholder="Giro del negocio (ej: comida, ropa, café)" required>

<input type="text" placeholder="RFC (opcional)">

<input type="url" placeholder="Sitio web (opcional)">

<input type="file" accept="image/*">

<button type="submit">Registrar negocio</button>

</form>

</div>

<script src="app.js"></script>

</body>
</html>
